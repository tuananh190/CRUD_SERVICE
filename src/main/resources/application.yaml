spring:
  datasource:
    url: jdbc:mysql://localhost:3306/social_network?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: '12345'
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 9090

application:
  security:
    jwt:
      secret-key: a-very-long-and-secure-random-secret-key-that-you-should-never-share

logging:
  level:
    org.springframework.security: DEBUG
    com.mar.CRUD_SERVICE: DEBUG
